name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      FIREBASE_PUBLIC_API_KEY: ${{ secrets.FIREBASE_PUBLIC_API_KEY }}
      FIREBASE_PUBLIC_AUTH_DOMAIN: ${{ secrets.FIREBASE_PUBLIC_AUTH_DOMAIN }}
      FIREBASE_PUBLIC_PROJECT_ID: ${{ secrets.FIREBASE_PUBLIC_PROJECT_ID }}
      FIREBASE_PUBLIC_STORAGE_BUCKET: ${{ secrets.FIREBASE_PUBLIC_STORAGE_BUCKET }}
      FIREBASE_PUBLIC_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_PUBLIC_MESSAGING_SENDER_ID }}
      FIREBASE_PUBLIC_APP_ID: ${{ secrets.FIREBASE_PUBLIC_APP_ID }}
      FIREBASE_PUBLIC_MEASUREMENT_ID: ${{ secrets.FIREBASE_PUBLIC_MEASUREMENT_ID }}
      NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
      NEXT_PUBLIC_BEACON_MODE: ${{ secrets.NEXT_PUBLIC_BEACON_MODE }}
      NEXT_PUBLIC_ENABLE_PHYSICAL_BEACONS: ${{ secrets.NEXT_PUBLIC_ENABLE_PHYSICAL_BEACONS }}
      NEXT_PUBLIC_MEDIAMTX_PRIMARY_WEBRTC_BASE_URL: ${{ secrets.NEXT_PUBLIC_MEDIAMTX_PRIMARY_WEBRTC_BASE_URL }}
      NEXT_PUBLIC_MEDIAMTX_PRIMARY_HLS_BASE_URL: ${{ secrets.NEXT_PUBLIC_MEDIAMTX_PRIMARY_HLS_BASE_URL }}
      NEXT_PUBLIC_MEDIAMTX_PRIMARY_LABEL: ${{ secrets.NEXT_PUBLIC_MEDIAMTX_PRIMARY_LABEL }}
      NEXT_PUBLIC_MEDIAMTX_FALLBACK_WEBRTC_BASE_URL: ${{ secrets.NEXT_PUBLIC_MEDIAMTX_FALLBACK_WEBRTC_BASE_URL }}
      NEXT_PUBLIC_MEDIAMTX_FALLBACK_HLS_BASE_URL: ${{ secrets.NEXT_PUBLIC_MEDIAMTX_FALLBACK_HLS_BASE_URL }}
      NEXT_PUBLIC_MEDIAMTX_FALLBACK_LABEL: ${{ secrets.NEXT_PUBLIC_MEDIAMTX_FALLBACK_LABEL }}
      MEDIAMTX_PRIMARY_API_URL: ${{ secrets.MEDIAMTX_PRIMARY_API_URL }}
      MEDIAMTX_PRIMARY_LABEL: ${{ secrets.MEDIAMTX_PRIMARY_LABEL }}
      MEDIAMTX_FALLBACK_API_URL: ${{ secrets.MEDIAMTX_FALLBACK_API_URL }}
      MEDIAMTX_FALLBACK_LABEL: ${{ secrets.MEDIAMTX_FALLBACK_LABEL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_BLUEPRINT_MODEL: ${{ secrets.GEMINI_BLUEPRINT_MODEL }}
      GEMINI_BLUEPRINT_MODELS: ${{ secrets.GEMINI_BLUEPRINT_MODELS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
